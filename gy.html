<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NASA Mission Control WebOS - WideScan v1.2</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #05070a;
            color: #00ff66;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            height: 100vh;
            user-select: none;
        }

        
        .taskbar {
            background-color: #0c0f14;
            border-bottom: 2px solid #00ff66;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 0 10px rgba(0, 255, 102, 0.3);
            position: relative;
            z-index: 9999;
        }

       
        .window {
            position: absolute;
            background-color: rgba(12, 15, 20, 0.95);
            border: 2px solid #00ff66;
            border-radius: 5px;
            box-shadow: 0 0 20px rgba(0, 255, 102, 0.3);
            width: 700px; 
            min-height: 200px;
        }

        #nasa-scanner-window { top: 200px; left: 400px; }
      

        .window-header {
            background-color: #00ff66;
            color: #05070a;
            font-weight: bold;
            padding: 8px 12px;
            font-size: 14px;
            cursor: move;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .window-body { 
            padding: 15px; 
            font-size: 13px; 
            line-height: 1.5;
            display: flex;
            flex-direction: column; /* Organize components vertically */
            align-items: center; /* Center-align components horizontally */
        }

        .controls {
            width: 100%;
            text-align: center;
            margin-bottom: 15px;

        }

        input[type="date"] {
            background-color: #05070a;
            border: 1px solid #2983a7;
            color: #1a097c;
            padding: 8px;
            font-family: monospace;
            border-radius: 4px;
            margin-bottom: 12px;
            width: 250px;
        }

        button {
            background-color: #6af8a3;
            color: #05070a;
            border: none;
            padding: 8px 15px;
            font-family: monospace;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            transition: 0.2s;
        }

        button:hover {
            background-color: #fff;
            box-shadow: 0 0 10px #00ff66;
        }

        /* Display area for the result */
        #space-result {
            margin-top: 15px;
            border-top: 1px dashed #00ff66;
            padding-top: 15px;
            width: 100%; 
            text-align: center;
        }

        #space-img {
            max-width: 100%; 
            height: auto; 
            border: 2px solid #00ff66;
            border-radius: 4px;
            display: none; 
            margin: 10px auto 0 auto; 
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.6);  

        }

        #space-title { font-size: 14px; color: #ffffff; margin: 5px 0; }
        #loading-text { display: none; color: #ffaa00; animation: blink 1s infinite; font-weight: bold; }

        @keyframes blink {
            50% { opacity: 0; }
        }
    </style>
</head>
<body>

    <!-- Main OS Taskbar -->
    <div class="taskbar">
        <div>🚀 NASA - DEEP SPACE OPERATING SYSTEM v1.2</div>
        <div>● STATUS: SECURE_CONNECTION</div>
    </div>

    <div class="window" id="nasa-scanner-window">
        <div class="window-header">🌌 NASA_BIRTHDAY_SCANNER</div>
        <div class="window-body">
            <div class="controls">
                <p>Select your birthday to fetch the astronomical photo captured by NASA on that day:</p>
                <input type="date" id="birthday-input" value="2008-07-13">
                <br>
                <button onclick="getNasaPhoto()">CONNECT TO APOD SERVER</button>
            </div>

            <div id="space-result">
                <div id="loading-text">Bypassing mainframe firewalls...</div>
                <h4 id="space-title">Awaiting commands...</h4>
                <img id="space-img" src="" alt="NASA Space Picture">
            </div>
        </div>
    </div>



    <script>
        // 1. API Fetch Function to get data from NASA APOD Server
        function getNasaPhoto() {
            const dateInput = document.getElementById('birthday-input').value;
            const loadingText = document.getElementById('loading-text');
            const spaceTitle = document.getElementById('space-title');
            const spaceImg = document.getElementById('space-img');

            if (!dateInput) return;

            loadingText.style.display = "block";
            spaceTitle.innerText = "";
            spaceImg.style.display = "none";

            // Using NASA's official DEMO_KEY to fetch live data
            const url = `https://api.nasa.gov/planetary/apod?api_key=DEMO_KEY&date=${dateInput}`;

            fetch(url)
            .then(response => response.json())
            .then(data => {
                loadingText.style.display = "none";
                if(data.media_type === "image") {
                    spaceTitle.innerText = data.title;
                    spaceImg.src = data.url;
                    spaceImg.style.display = "block";
                } else {
                    spaceTitle.innerText = "NASA captured a video on this day: " + data.title;
                    // Reset image if previous result was an image
                    spaceImg.src = "";
                }
            })
            .catch(error => {
                loadingText.style.display = "none";
                spaceTitle.innerText = "Connection failed! Please check your internet.";
                spaceImg.src = "";
            });
        }

        // 2. 
        function makeWindowDraggable(elmnt) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            const header = elmnt.querySelector('.window-header');
            
            if (header) {
                header.onmousedown = dragMouseDown;
            }

            function dragMouseDown(e) {
                e = e || window.event;
                e.preventDefault();
                // Get the initial mouse cursor position at startup
                pos3 = e.clientX;
                pos4 = e.clientY;
                document.onmouseup = closeDragElement;
                document.onmousemove = elementDrag;
            }

            function elementDrag(e) {
                e = e || window.event;
                e.preventDefault();
                // Calculate the new cursor position
                pos1 = pos3 - e.clientX;
                pos2 = pos4 - e.clientY;
                pos3 = e.clientX;
                pos4 = e.clientY;
                // Set the element's new position
                elmnt.style.top = (elmnt.offsetTop - pos2) + "px";
                elmnt.style.left = (elmnt.offsetLeft - pos1) + "px";
            }

            function closeDragElement() {
                
                document.onmouseup = null;
                document.onmousemove = null;
            }
        }

        document.querySelectorAll('.window').forEach(win => {
            makeWindowDraggable(win);
        });
    </script>
</body>
</html>
